name: Build & Deploy Points Ledger

on:
  schedule:
    - cron: "15 22 * * *"   # 毎日 22:15 UTC = 日本時間 7:15
  workflow_dispatch: {}      # 手動実行ボタンも有効化

permissions:
  contents: write            # dist をコミットするため write に変更

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build (fetch sheet & embed into HTML)
        env:
          SHEET_ID: ${{ secrets.SHEET_ID }}
          POINTS_GID: ${{ secrets.POINTS_GID }}
          CASH_GID: ${{ secrets.CASH_GID }}
        run: python3 build.py

      - name: Publish dist to output branch
        run: |
          set -e
          # dist の中身だけを orphan ブランチ 'deploy' に反映する
          # (履歴を汚さず、常に最新の成果物のみを保持)
          cd dist
          touch .nojekyll
          git init -q
          git config user.name  "areare-bot"
          git config user.email "areare-bot@users.noreply.github.com"
          git checkout -q -b deploy
          git add -A
          git commit -q -m "Deploy $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push -q -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" deploy
